<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Shani ❤️</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@400;500;600;700;800&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Abhaya Libre', serif;
            background: linear-gradient(135deg, #1a0b2e 0%, #3e1b4b 50%, #61215b 100%);
            color: #fff;
            overflow: hidden;
            margin: 0;
            height: 100vh;
        }
        .english-font {
            font-family: 'Great Vibes', cursive;
        }
        
        /* Hearts Animation */
        .heart {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #ff2a5f;
            transform: rotate(45deg);
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 0 10px rgba(255, 42, 95, 0.8));
        }
        .heart::before,
        .heart::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: #ff2a5f;
            border-radius: 50%;
        }
        .heart::before {
            left: -10px;
        }
        .heart::after {
            top: -10px;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(45deg) scale(0.5);
                opacity: 0;
            }
            20% {
                opacity: 1;
            }
            80% {
                opacity: 1;
            }
            100% {
                transform: translateY(-20vh) rotate(45deg) scale(1.2);
                opacity: 0;
            }
        }

        .glow-text {
            text-shadow: 0 0 15px rgba(255, 107, 158, 0.8), 0 0 30px rgba(255, 107, 158, 0.5);
            line-height: 1.4;
        }

        /* Glassmorphism card */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

    </style>
</head>
<body class="w-full flex items-center justify-center relative cursor-pointer" id="container">

    <!-- Hearts container -->
    <div id="hearts-container" class="absolute inset-0 pointer-events-none"></div>

    <div class="glass-card flex flex-col items-center justify-center p-8 md:p-16 rounded-3xl z-10 mx-4 text-center transform hover:scale-105 transition duration-500">
        
        <div class="english-font text-5xl md:text-7xl text-pink-300 mb-2 animate-pulse">
            To my beautiful
        </div>
        
        <h1 class="text-7xl md:text-9xl font-extrabold text-[#ff4d85] glow-text mb-6">
            ශානි ❤️
        </h1>
        
        <div class="mt-4 border-t border-pink-500/30 w-full pt-6">
            <h2 class="text-5xl md:text-7xl font-semibold text-white tracking-wide glow-text pb-2">
                මම ඔයාට<br><span class="text-pink-400">ගොඩාක් ආදරෙයි</span>
            </h2>
        </div>

        <p class="mt-6 text-pink-200 text-2xl md:text-3xl font-light opacity-90 english-font tracking-wider">
            You mean the world to me
        </p>

        <button id="loveBtn" class="mt-8 px-8 py-3 bg-pink-600 hover:bg-pink-500 text-white rounded-full font-bold tracking-wider shadow-[0_0_20px_rgba(236,72,153,0.6)] transition-all transform hover:scale-110 active:scale-95 text-xl">
            Click Me 💖
        </button>
        
    </div>

    <script>
        // Floating Hearts Background
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            
            // Random horizontal position
            heart.style.left = Math.random() * 100 + 'vw';
            
            // Random animation duration
            const duration = Math.random() * 3 + 4; // Between 4 and 7 seconds
            heart.style.animationDuration = duration + 's';
            
            // Random size using transform scale (applied via animation usually, so we scale the pseudo elements instead ideally, but random duration gives variety)
            // Just let CSS handle standard size, but vary starting opacity slightly
            heart.style.opacity = Math.random() * 0.5 + 0.5;

            document.getElementById('hearts-container').appendChild(heart);

            // Remove heart after it goes off screen
            setTimeout(() => {
                heart.remove();
            }, duration * 1000);
        }

        // Create hearts at intervals
        setInterval(createHeart, 400);

        // Intitial burst of hearts
        for(let i=0; i<10; i++) {
            setTimeout(createHeart, i * 100);
        }

        // Interactive Click Effect
        const container = document.getElementById('container');
        
        container.addEventListener('click', function(e) {
            if(e.target.id === 'loveBtn') return;
            createInteractionHearts(e.clientX, e.clientY);
        });

        // Button click event
        const loveBtn = document.getElementById('loveBtn');
        loveBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            
            const originalText = this.innerHTML;
            this.innerHTML = "I Love You More! 💖💞";
            
            const rect = this.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;
            
            for(let i=0; i<20; i++) {
                setTimeout(() => createInteractionHearts(x, y), i * 30);
            }

            setTimeout(() => {
                this.innerHTML = originalText;
            }, 3000);
        });

        function createInteractionHearts(x, y) {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.style.position = 'absolute';
            heart.style.left = x + 'px';
            heart.style.top = y + 'px';
            heart.style.transform = 'translate(-50%, -50%)';
            heart.style.fontSize = (Math.random() * 20 + 20) + 'px';
            heart.style.pointerEvents = 'none';
            heart.style.zIndex = '50';
            heart.style.transition = 'all 1s ease-out';
            heart.style.filter = 'drop-shadow(0 0 5px rgba(255,0,0,0.5))';
            
            document.body.appendChild(heart);
            
            const angle = Math.random() * Math.PI * 2;
            const velocity = Math.random() * 100 + 50;
            const tx = Math.cos(angle) * velocity;
            const ty = Math.sin(angle) * velocity - 100; // Prefer moving upwards
            
            setTimeout(() => {
                heart.style.transform = `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(1.5)`;
                heart.style.opacity = '0';
            }, 50);
            
            setTimeout(() => {
                heart.remove();
            }, 1050);
        }
    </script>
</body>
</html>
